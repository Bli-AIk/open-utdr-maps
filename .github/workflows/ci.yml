name: CI

on:
  push:
    branches: [ main ]
    paths:
      - 'viewer/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'viewer/**'

env:
  CARGO_TERM_COLOR: always

permissions:
  checks: write
  contents: read

jobs:
  test:
    name: Test (Native)
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: viewer
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev \
            libudev-dev \
            libwayland-dev \
            libxkbcommon-dev \
            libxrandr-dev \
            libx11-dev \
            libxi-dev \
            libxinerama-dev \
            libxcursor-dev \
            libgl1-mesa-dev \
            pkg-config \
            mold

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "ci-test"
          workspaces: "viewer"

      - name: Prepare viewer assets
        run: bash scripts/prepare_assets.sh

      - name: Check formatting
        run: cargo fmt -- --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Build
        run: cargo build --release

      - name: Run tests
        run: cargo test

  wasm:
    name: Test (WASM)
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: viewer
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "ci-wasm"
          workspaces: "viewer"

      - name: Prepare viewer assets
        run: bash scripts/prepare_assets.sh

      - name: Check WASM build
        run: cargo check --target wasm32-unknown-unknown
