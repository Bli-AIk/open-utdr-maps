  "obj_bouncetilecontoller",
  "obj_underground_exit",
  "obj_readable_room1",
  "obj_weirdEvent_addison_city_big_2",
  "obj_controller_dw_city_big_2",
  "obj_charmarker",
  "obj_board_solid",
  "obj_board_checkpoint",
  "obj_board_boatsolid",
  "obj_b3lobby",
  "obj_board_b3_elevatorcheck",
  "obj_board_warptouch",
  "obj_chaseenemy_board_spawner",
  "obj_board_trigger",
  "obj_dw_church_intro1",
  "obj_readable_room4",
  "obj_readable_room5",
  "obj_trigger_room",
  "obj_cookshowevent",
  "obj_quietwatermusic",
  "obj_mysterymusic",
  "obj_encounterer_glyde",
  "obj_icecave_fader",
  "obj_shockblock",
  "obj_papyrus2",
  "obj_sur",
