# Blacklist rules for promoting a room from raw/ to curated/.
# Update this file instead of hard-coding new cleanup rules in the script.

[layer_names]
exact = ["views"]

[object_types]
exact = [
  "obj_overworldcontroller",
  "obj_bouncetilecontoller",
  "obj_underground_exit",
  "obj_readable_room1",
  "obj_weirdEvent_addison_city_big_2",
  "obj_controller_dw_city_big_2",
  "obj_charmarker",
  "obj_board_solid",
  "obj_board_checkpoint",
  "obj_board_boatsolid",
  "obj_b3lobby",
  "obj_board_b3_elevatorcheck",
  "obj_board_warptouch",
  "obj_chaseenemy_board_spawner",
  "obj_board_trigger",
  "obj_dw_church_intro1",
]
keep_exact = [
  "obj_door_solid",
  "obj_solidrailing",
  "obj_solidrailing2",
  "obj_solidrailing3",
]
prefix = [
  "obj_marker",
  "obj_solid",
  "obj_door",
]

[cleanup]
remove_empty_object_layers = true

# Optional per-room keeps. Use "<dataset>:<room>" as the key.
# Example:
# [rooms."undertale:room_fire2"]
# keep_object_types_exact = ["obj_doorA"]
# keep_object_types_prefix = []
# keep_layer_names_exact = []
